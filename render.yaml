services:
  - type: web
    name: blockvotes-api
    runtime: node
    plan: free
    buildCommand: corepack enable && pnpm install --frozen-lockfile && pnpm --filter @workspace/api-server run build
    startCommand: pnpm --filter @workspace/db run push && pnpm --filter @workspace/api-server run start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 24.14.1
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: blockvotes-db
          property: connectionString
      - key: ADMIN_SESSION_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        sync: false
      - key: PUBLIC_WEB_URL
        sync: false
      - key: APP_URL
        sync: false
      - key: BREVO_SMTP_LOGIN
        sync: false
      - key: BREVO_SMTP_PASS
        sync: false
      - key: BREVO_SENDER
        sync: false
      - key: BLOCKCHAIN_ENABLED
        value: "false"
      - key: ELECTION_AUTOMATION_ENABLED
        value: "true"
      - key: ELECTION_AUTOMATION_INTERVAL_MS
        value: "5000"

databases:
  - name: blockvotes-db
    plan: free
