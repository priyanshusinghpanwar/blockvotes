packages:
  "framer-motion": "For page transitions, micro-interactions, and blockchain voting visualizations"
  "recharts": "For displaying election results in beautiful bar charts"
  "zustand": "For lightweight global state management (auth sessions)"
  "clsx": "For conditional class names merging"
  "tailwind-merge": "For merging tailwind classes safely"
  "lucide-react": "For beautiful consistent iconography"
  "date-fns": "For formatting dates in the election dashboard"

images:
